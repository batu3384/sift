name: Feature request
description: Propose a new capability or UX improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow is blocked or inefficient today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or UX you want to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add parity references, screenshots, or prior discussion links if relevant.
