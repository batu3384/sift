name: release

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Security guard
        run: ./hack/security_check.sh
      - name: Test
        run: go test ./...
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate package manifests
        run: |
          chmod +x ./hack/generate_package_manifests.sh ./hack/generate_homebrew_formula.sh ./hack/generate_scoop_manifest.sh ./hack/generate_winget_manifest.sh ./hack/release_preflight.sh
          ./hack/generate_package_manifests.sh "${GITHUB_REF_NAME}" ./dist ./dist/manifests
          ./hack/release_preflight.sh "${GITHUB_REF_NAME}" ./dist ./dist/manifests
      - name: Upload Homebrew formula
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: dist/manifests/homebrew
      - name: Upload Scoop manifest
        uses: actions/upload-artifact@v4
        with:
          name: scoop-manifest
          path: dist/manifests/scoop
      - name: Upload Winget manifests
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests
          path: dist/manifests/winget
      - name: Upload release manifests bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-manifests
          path: dist/manifests
